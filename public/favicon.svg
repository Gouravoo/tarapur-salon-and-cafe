<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Premium Dark Background with subtle gradient -->
  <rect width="256" height="256" rx="64" fill="url(#bg-gradient)"/>
  
  <!-- Outer Gold Ring -->
  <rect x="8" y="8" width="240" height="240" rx="56" stroke="url(#gold-gradient)" stroke-width="4" stroke-opacity="0.3"/>
  <rect x="16" y="16" width="224" height="224" rx="48" stroke="url(#gold-gradient)" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Subtle glow behind text -->
  <circle cx="128" cy="128" r="80" fill="url(#glow)"/>

  <!-- '007' Text Styling -->
  <text 
    x="128" 
    y="160" 
    font-family="Georgia, serif" 
    font-size="110" 
    font-weight="bold" 
    text-anchor="middle" 
    fill="url(#gold-gradient)"
    letter-spacing="4"
  >
    007
  </text>

  <!-- Gradients -->
  <defs>
    <!-- Background Gradient: Deep Charcoal to Black -->
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>

    <!-- Gold Gradient: Premium Metallic Look -->
    <linearGradient id="gold-gradient" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5D061"/>
      <stop offset="30%" stop-color="#E2B743"/>
      <stop offset="50%" stop-color="#FFF0A8"/>
      <stop offset="70%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8A6E24"/>
    </linearGradient>

    <!-- Subtle Glow for Depth -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>